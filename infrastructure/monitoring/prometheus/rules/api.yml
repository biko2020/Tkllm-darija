# =============================================================================
# Alerting Rules — NestJS API
# =============================================================================
groups:
  - name: tkllm.api
    interval: 15s
    rules:

      # ── Request Rate ───────────────────────────────────────────────────────
      - alert: ApiHighRequestRate
        expr: |
          sum(rate(http_requests_total{service="api"}[2m])) > 500
        for: 5m
        labels:
          severity: warning
          service:  api
        annotations:
          summary:     "API high request rate"
          description: "API is receiving {{ $value | humanize }} req/s — investigate traffic spike or DDoS."

      # ── Error Rate ────────────────────────────────────────────────────────
      - alert: ApiHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{service="api", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{service="api"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          service:  api
        annotations:
          summary:     "API error rate above 5%"
          description: "API 5xx error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: ApiElevatedErrorRate
        expr: |
          (
            sum(rate(http_requests_total{service="api", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{service="api"}[5m]))
          ) > 0.01
        for: 10m
        labels:
          severity: warning
          service:  api
        annotations:
          summary:     "API error rate above 1%"
          description: "API 5xx error rate is {{ $value | humanizePercentage }}."

      # ── Latency ───────────────────────────────────────────────────────────
      - alert: ApiHighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{service="api"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: critical
          service:  api
        annotations:
          summary:     "API P99 latency above 2s"
          description: "API P99 response time is {{ $value | humanizeDuration }}."

      - alert: ApiHighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{service="api"}[5m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
          service:  api
        annotations:
          summary:     "API P95 latency above 1s"
          description: "API P95 response time is {{ $value | humanizeDuration }}."

      # ── Availability ──────────────────────────────────────────────────────
      - alert: ApiDown
        expr: up{service="api"} == 0
        for: 1m
        labels:
          severity: critical
          service:  api
        annotations:
          summary:     "API is down"
          description: "The NestJS API target {{ $labels.instance }} is unreachable."

      # ── GraphQL ───────────────────────────────────────────────────────────
      - alert: GraphQLHighErrorRate
        expr: |
          (
            sum(rate(graphql_errors_total{service="api"}[5m]))
            /
            sum(rate(graphql_requests_total{service="api"}[5m]))
          ) > 0.02
        for: 5m
        labels:
          severity: warning
          service:  api
        annotations:
          summary:     "GraphQL error rate above 2%"
          description: "GraphQL error rate is {{ $value | humanizePercentage }}."

      # ── Memory ────────────────────────────────────────────────────────────
      - alert: ApiHighMemoryUsage
        expr: |
          process_resident_memory_bytes{service="api"} > 900 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
          service:  api
        annotations:
          summary:     "API memory usage above 900MB"
          description: "API memory is {{ $value | humanize1024 }}B — OOMKill risk."