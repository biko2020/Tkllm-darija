# =============================================================================
# NGINX — Local Dev Reverse Proxy
# =============================================================================
# Runs on localhost:80 and routes to all local services by path/subdomain.
# This mirrors the production NGINX Ingress Controller behaviour so local
# dev is as close to prod as possible without requiring DNS changes.
#
# Routes (path-based — all via localhost:80):
#   /                       → web-contributor  :3002
#   /b2b/                   → web-b2b          :3003
#   /api/                   → nestjs api        :3000
#   /graphql                → nestjs api        :3000
#   /minio/                 → minio console     :9001
#   /mlflow/                → mlflow            :5000
#   /prefect/               → prefect           :4200
#
# Subdomain-based (add to /etc/hosts or use a wildcard DNS):
#   app.localhost           → web-contributor   :3002
#   b2b.localhost           → web-b2b           :3003
#   api.localhost           → nestjs api        :3000
#   mlflow.localhost        → mlflow            :5000
#   prefect.localhost       → prefect           :4200
#   minio.localhost         → minio console     :9001
#   grafana.localhost       → grafana           :3001
# =============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
  use                epoll;
  multi_accept       on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain text/css application/json
                     application/javascript text/xml application/xml
                     application/xml+rss text/javascript;

  # ── Max body size — allow large audio uploads (up to 50 MB) ───────────────
  client_max_body_size 50M;

  # ── Timeouts ───────────────────────────────────────────────────────────────
  proxy_connect_timeout 15s;
  proxy_send_timeout    60s;
  proxy_read_timeout    60s;

  # ── Proxy headers — passed to all upstreams ────────────────────────────────
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # ── WebSocket support ─────────────────────────────────────────────────────
  proxy_http_version 1.1;
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_set_header   Connection "upgrade";

  # ==========================================================================
  # Upstreams
  # ==========================================================================
  upstream api_upstream           { server api:3000;            }
  upstream web_contributor_upstream { server web-contributor:3000; }
  upstream web_b2b_upstream       { server web-b2b:3000;         }
  upstream mlflow_upstream        { server mlflow:5000;          }
  upstream prefect_upstream       { server prefect:4200;         }
  upstream minio_upstream         { server minio:9000;           }
  upstream minio_console_upstream { server minio:9001;           }
  upstream grafana_upstream       { server grafana:3001;         }

  # ==========================================================================
  # Server — path-based routing on localhost:80
  # ==========================================================================
  server {
    listen      80;
    server_name localhost;

    # ── Health check ──────────────────────────────────────────────────────────
    location /nginx-health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # ── NestJS API ────────────────────────────────────────────────────────────
    location /api/ {
      proxy_pass http://api_upstream/api/;
    }

    location /graphql {
      proxy_pass http://api_upstream/graphql;
    }

    location /metrics {
      proxy_pass http://api_upstream/metrics;
    }

    # ── MinIO S3 API ──────────────────────────────────────────────────────────
    location /minio-s3/ {
      proxy_pass            http://minio_upstream/;
      proxy_buffering       off;
      proxy_request_buffering off;
      chunked_transfer_encoding on;
    }

    # ── MinIO Console ─────────────────────────────────────────────────────────
    location /minio/ {
      proxy_pass            http://minio_console_upstream/;
      proxy_buffering       off;
      rewrite ^/minio/(.*) /$1 break;
    }

    # ── MLflow ────────────────────────────────────────────────────────────────
    location /mlflow/ {
      proxy_pass http://mlflow_upstream/;
      rewrite ^/mlflow/(.*) /$1 break;
    }

    # ── Prefect ───────────────────────────────────────────────────────────────
    location /prefect/ {
      proxy_pass http://prefect_upstream/;
      rewrite ^/prefect/(.*) /$1 break;
    }

    # ── Grafana ───────────────────────────────────────────────────────────────
    location /grafana/ {
      proxy_pass http://grafana_upstream/;
      rewrite ^/grafana/(.*) /$1 break;
    }

    # ── B2B Portal — /b2b prefix ──────────────────────────────────────────────
    location /b2b/ {
      proxy_pass http://web_b2b_upstream/;
      rewrite ^/b2b/(.*) /$1 break;
    }

    # ── Contributor App — root (catch-all) ────────────────────────────────────
    location / {
      proxy_pass http://web_contributor_upstream/;
    }
  }

  # ==========================================================================
  # Server — subdomain routing (requires /etc/hosts or wildcard DNS)
  # ==========================================================================

  server {
    listen      80;
    server_name api.localhost;
    location / { proxy_pass http://api_upstream; }
  }

  server {
    listen      80;
    server_name app.localhost;
    location / { proxy_pass http://web_contributor_upstream; }
  }

  server {
    listen      80;
    server_name b2b.localhost;
    location / { proxy_pass http://web_b2b_upstream; }
  }

  server {
    listen      80;
    server_name mlflow.localhost;
    location / { proxy_pass http://mlflow_upstream; }
  }

  server {
    listen      80;
    server_name prefect.localhost;
    location / { proxy_pass http://prefect_upstream; }
  }

  server {
    listen      80;
    server_name minio.localhost;

    # S3 API on port 9000 path
    location /s3/ {
      proxy_pass            http://minio_upstream/;
      proxy_buffering       off;
      proxy_request_buffering off;
      rewrite ^/s3/(.*) /$1 break;
    }

    # Console (default)
    location / {
      proxy_pass    http://minio_console_upstream;
      proxy_buffering off;
    }
  }

  server {
    listen      80;
    server_name grafana.localhost;
    location / { proxy_pass http://grafana_upstream; }
  }
}