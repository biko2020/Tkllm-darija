    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tkllm_user}:${POSTGRES_PASSWORD:-tkllm_password}@postgres:5432/${POSTGRES_DB:-tkllm_darija}
      KAFKA_BROKER: kafka:29092
      REDIS_URL: redis://redis:6379
    networks:
