# =============================================================================
# ResourceQuota — prod
# Full production caps. Sized for 3-replica user-facing services,
# 5 GPU ASR worker nodes, and peak contributor load.
# NodePort is blocked — all traffic routes through Ingress.
# =============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tkllm-resource-quota
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/managed-by: kustomize
    component: quota-prod
spec:
  hard:
    # ── Compute ──────────────────────────────────────────────────────────────
    requests.cpu:     "40"
    requests.memory:  "80Gi"
    limits.cpu:       "120"
    limits.memory:    "240Gi"

    # ── GPU — up to 5 nodes for KEDA-scaled ASR workers ─────────────────────
    requests.nvidia.com/gpu: "5"
    limits.nvidia.com/gpu:   "5"

    # ── Workloads ────────────────────────────────────────────────────────────
    pods:                     "80"
    count/deployments.apps:   "20"
    count/statefulsets.apps:  "10"
    count/jobs.batch:         "20"
    count/cronjobs.batch:     "10"

    # ── Storage ──────────────────────────────────────────────────────────────
    persistentvolumeclaims:   "20"
    requests.storage:         "2Ti"

    # ── Services ─────────────────────────────────────────────────────────────
    services:                 "30"
    services.loadbalancers:   "2"
    services.nodeports:       "0"     # no NodePort — all traffic via Ingress

    # ── Config & Secrets ─────────────────────────────────────────────────────
    configmaps:               "30"
    secrets:                  "30"