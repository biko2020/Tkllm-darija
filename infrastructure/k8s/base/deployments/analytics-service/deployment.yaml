# =============================================================================
# Deployment — Analytics Service  (services/analytics-service)
# Tracks contributor activity, data quality metrics, and growth KPIs.
# Writes aggregated time-series data to TimescaleDB hypertables.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/name: analytics-service
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: analytics-service
        app.kubernetes.io/name: analytics-service
        app.kubernetes.io/part-of: tkllm-darija
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: analytics-service
          image: ghcr.io/biko2020/tkllm-darija/analytics-service:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9091
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: tkllm-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tkllm-secrets
                  key: DATABASE_URL
            - name: KAFKA_BROKER
              value: "kafka:9092"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ANALYTICS_RETENTION_DAYS
              value: "365"
            - name: ANALYTICS_AGGREGATION_INTERVAL
              value: "1h"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9091
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3