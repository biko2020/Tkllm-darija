apiVersion: v1
kind: Service
metadata:
  name: web-contributor
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/name: web-contributor
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: web-contributor
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP