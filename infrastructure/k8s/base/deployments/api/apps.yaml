# =============================================================================
# Deployment — ASR Worker  (services/asr-worker)
# GPU node selector: nvidia.com/gpu — uses node taint toleration
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asr-worker
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/name: asr-worker
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: ml-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asr-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: asr-worker
        app.kubernetes.io/part-of: tkllm-darija
        app.kubernetes.io/component: ml-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 120     # allow in-flight transcription to finish
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      nodeSelector:
        node-role: gpu
      containers:
        - name: asr-worker
          image: ghcr.io/biko2020/tkllm-darija/asr-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: common-config
            - configMapRef:
                name: ml-config
            - secretRef:
                name: tkllm-secrets
          volumeMounts:
            - name: hf-cache
              mountPath: /tmp/hf_cache
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-pvc

