# =============================================================================
# Deployment — NestJS API  (apps/api)
# REST :3000  |  GraphQL :3000/graphql  |  Metrics :3000/metrics
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api
        app.kubernetes.io/part-of: tkllm-darija
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: tkllm-api
      containers:
        - name: api
          image: ghcr.io/biko2020/tkllm-darija/api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: common-config
            - configMapRef:
                name: api-config
            - secretRef:
                name: tkllm-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api

---
# =============================================================================
# Deployment — Next.js Contributor Web App  (apps/web-contributor)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-contributor
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/name: web-contributor
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-contributor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: web-contributor
        app.kubernetes.io/part-of: tkllm-darija
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web-contributor
          image: ghcr.io/biko2020/tkllm-darija/web-contributor:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.tkllm-darija.ma/api/v1"
            - name: NEXT_PUBLIC_APP_NAME
              value: "Tkllm-darija"
            - name: NEXT_PUBLIC_APP_ENV
              value: "production"
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tkllm-secrets
                  key: SUPABASE_URL
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: tkllm-secrets
                  key: SUPABASE_ANON_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

