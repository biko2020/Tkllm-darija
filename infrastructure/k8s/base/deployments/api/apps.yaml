# =============================================================================
# Deployment — MLflow  (experiment tracking + model registry)
# UI → https://mlflow.tkllm-darija.ma
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: ml-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
        app.kubernetes.io/part-of: tkllm-darija
        app.kubernetes.io/component: ml-platform
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.13.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          command:
            - mlflow
            - server
            - "--backend-store-uri"
            - "$(DATABASE_URL)"
            - "--default-artifact-root"
            - "s3://$(S3_BUCKET_MODELS)/mlflow"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "5000"
            - "--serve-artifacts"
          envFrom:
            - secretRef:
                name: tkllm-secrets
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: tkllm-secrets
                  key: S3_ENDPOINT
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: tkllm-secrets
                  key: S3_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tkllm-secrets
                  key: S3_SECRET_KEY
            - name: S3_BUCKET_MODELS
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: S3_BUCKET_MODELS
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-pvc

---
# =============================================================================
# Deployment — Prefect  (pipeline orchestration)
# UI → https://prefect.tkllm-darija.ma
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/name: prefect
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: ml-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect
  template:
    metadata:
      labels:
        app: prefect
        app.kubernetes.io/part-of: tkllm-darija
        app.kubernetes.io/component: ml-platform
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: prefect
          image: prefecthq/prefect:3-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4200
          command: ["prefect", "server", "start"]
          env:
            - name: PREFECT_SERVER_API_HOST
              value: "0.0.0.0"
            - name: PREFECT_SERVER_API_PORT
              value: "4200"
            - name: PREFECT_API_DATABASE_CONNECTION_URL
              value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@postgres:5432/tkllm_darija"
            - name: PREFECT_SERVER_ANALYTICS_ENABLED
              value: "false"
            - name: PREFECT_LOGGING_LEVEL
              value: "INFO"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: tkllm-secrets
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tkllm-secrets
                  key: DATABASE_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4200
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4200
            initialDelaySeconds: 15
            periodSeconds: 10