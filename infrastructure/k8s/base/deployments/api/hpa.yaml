# =============================================================================
# HorizontalPodAutoscaler — NestJS API
# Scale 2 → 10 pods based on CPU + memory.
# Requires: metrics-server  (kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml)
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300     # 5 min cool-down before scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# =============================================================================
# HorizontalPodAutoscaler — ASR Worker
# Scale 1 → 5 GPU pods based on Kafka consumer lag.
# Requires: KEDA (https://keda.sh) — ScaledObject instead of standard HPA
# for Kafka-lag-based autoscaling.
# =============================================================================
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: asr-worker-scaledobject
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: ml-worker
spec:
  scaleTargetRef:
    name: asr-worker
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: asr-worker-group
        topic: transcription.requested
        lagThreshold: "5"               # scale up when lag > 5 messages per pod
        offsetResetPolicy: latest

---
# =============================================================================
# HorizontalPodAutoscaler — Quality Engine
# Scale 2 → 8 pods based on CPU + Kafka consumer lag.
# =============================================================================
apiVersion: autoscaling/v2
