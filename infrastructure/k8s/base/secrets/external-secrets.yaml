# =============================================================================
# ExternalSecret — pulls all secrets from AWS SSM Parameter Store
# Requires: External Secrets Operator + a SecretStore/ClusterSecretStore
# pointing to your AWS account.
#
# Install ESO:  helm install external-secrets external-secrets/external-secrets
# Docs:         https://external-secrets.io
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tkllm-secrets
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm-store        # ClusterSecretStore defined in infra/terraform
    kind: ClusterSecretStore
  target:
    name: tkllm-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /tkllm-darija/production/DATABASE_URL

    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: /tkllm-darija/production/DATABASE_PASSWORD

    - secretKey: REDIS_URL
      remoteRef:
        key: /tkllm-darija/production/REDIS_URL

    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: /tkllm-darija/production/REDIS_PASSWORD

    - secretKey: JWT_SECRET
      remoteRef:
        key: /tkllm-darija/production/JWT_SECRET

    - secretKey: COOKIE_SECRET
      remoteRef:
        key: /tkllm-darija/production/COOKIE_SECRET

    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: /tkllm-darija/production/ENCRYPTION_KEY

    - secretKey: S3_ENDPOINT
      remoteRef:
        key: /tkllm-darija/production/S3_ENDPOINT

    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: /tkllm-darija/production/S3_ACCESS_KEY

    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: /tkllm-darija/production/S3_SECRET_KEY

    - secretKey: SUPABASE_URL
      remoteRef:
        key: /tkllm-darija/production/SUPABASE_URL

    - secretKey: SUPABASE_ANON_KEY
      remoteRef:
        key: /tkllm-darija/production/SUPABASE_ANON_KEY

    - secretKey: SUPABASE_SERVICE_ROLE_KEY
      remoteRef:
        key: /tkllm-darija/production/SUPABASE_SERVICE_ROLE_KEY

    - secretKey: SUPABASE_JWT_SECRET
      remoteRef:
        key: /tkllm-darija/production/SUPABASE_JWT_SECRET

    - secretKey: KEYCLOAK_URL
      remoteRef:
        key: /tkllm-darija/production/KEYCLOAK_URL

    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: /tkllm-darija/production/KEYCLOAK_CLIENT_SECRET

    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: /tkllm-darija/production/GOOGLE_CLIENT_ID

    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: /tkllm-darija/production/GOOGLE_CLIENT_SECRET

    - secretKey: TWILIO_ACCOUNT_SID
      remoteRef:
        key: /tkllm-darija/production/TWILIO_ACCOUNT_SID

    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef:
        key: /tkllm-darija/production/TWILIO_AUTH_TOKEN

    - secretKey: TWILIO_PHONE_NUMBER
      remoteRef:
        key: /tkllm-darija/production/TWILIO_PHONE_NUMBER

    - secretKey: HUGGINGFACE_TOKEN
      remoteRef:
        key: /tkllm-darija/production/HUGGINGFACE_TOKEN

    - secretKey: PINECONE_API_KEY
      remoteRef:
        key: /tkllm-darija/production/PINECONE_API_KEY

    - secretKey: PINECONE_ENVIRONMENT
      remoteRef:
        key: /tkllm-darija/production/PINECONE_ENVIRONMENT

    - secretKey: CMI_MERCHANT_ID
      remoteRef:
        key: /tkllm-darija/production/CMI_MERCHANT_ID

    - secretKey: CMI_STORE_KEY
      remoteRef:
        key: /tkllm-darija/production/CMI_STORE_KEY

    - secretKey: ORANGE_MONEY_CLIENT_ID
      remoteRef:
        key: /tkllm-darija/production/ORANGE_MONEY_CLIENT_ID

    - secretKey: ORANGE_MONEY_CLIENT_SECRET
      remoteRef:
        key: /tkllm-darija/production/ORANGE_MONEY_CLIENT_SECRET

    - secretKey: ORANGE_MONEY_MERCHANT_KEY
      remoteRef:
        key: /tkllm-darija/production/ORANGE_MONEY_MERCHANT_KEY

    - secretKey: INWI_MONEY_PARTNER_ID
      remoteRef:
        key: /tkllm-darija/production/INWI_MONEY_PARTNER_ID

    - secretKey: INWI_MONEY_API_KEY
      remoteRef:
        key: /tkllm-darija/production/INWI_MONEY_API_KEY

    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: /tkllm-darija/production/SENDGRID_API_KEY

    - secretKey: SENTRY_DSN
      remoteRef:
        key: /tkllm-darija/production/SENTRY_DSN