# =============================================================================
# Secret — tkllm-secrets  (TEMPLATE — DO NOT COMMIT REAL VALUES)
# =============================================================================
# In CI/CD, inject real values via:
#   - External Secrets Operator  (recommended — pulls from AWS SSM / Vault)
#   - Sealed Secrets             (kubeseal encrypts values for git storage)
#   - kubectl create secret      (manual — use for one-off bootstrapping)
#
# All values MUST be base64-encoded when using kind: Secret directly.
# Example: echo -n "my-secret" | base64
#
# With External Secrets Operator, replace this manifest with an
# ExternalSecret CR pointing to your secret store (see secrets/external-secret.yaml).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: tkllm-secrets
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
  annotations:
    # Prevent accidental deletion
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # ── Database ──────────────────────────────────────────────────────────────
  DATABASE_URL: "postgresql://tkllm_user:CHANGE_ME@postgres:5432/tkllm_darija"
  DATABASE_USER: "tkllm_user"
  DATABASE_PASSWORD: "CHANGE_ME"

  # ── Redis ─────────────────────────────────────────────────────────────────
  REDIS_URL: "redis://:CHANGE_ME@redis:6379"
  REDIS_PASSWORD: "CHANGE_ME"

  # ── Object Storage (Cloudflare R2 / AWS S3) ───────────────────────────────
  S3_ENDPOINT: "https://ACCOUNT_ID.r2.cloudflarestorage.com"
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
  S3_PUBLIC_URL: "https://assets.tkllm-darija.ma"

  # ── JWT & Cookies ─────────────────────────────────────────────────────────
  JWT_SECRET: "CHANGE_ME_use_openssl_rand_hex_64"
  COOKIE_SECRET: "CHANGE_ME_use_openssl_rand_hex_32"
  ENCRYPTION_KEY: "CHANGE_ME_use_openssl_rand_hex_32"

  # ── Supabase ──────────────────────────────────────────────────────────────
  SUPABASE_URL: "https://PROJECT_REF.supabase.co"
  SUPABASE_ANON_KEY: "CHANGE_ME"
  SUPABASE_SERVICE_ROLE_KEY: "CHANGE_ME"
  SUPABASE_JWT_SECRET: "CHANGE_ME"

  # ── Keycloak ──────────────────────────────────────────────────────────────
  KEYCLOAK_URL: "https://auth.tkllm-darija.ma"
  KEYCLOAK_CLIENT_SECRET: "CHANGE_ME"

  # ── OAuth2 ────────────────────────────────────────────────────────────────
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"

  # ── Twilio (OTP / SMS) ────────────────────────────────────────────────────
  TWILIO_ACCOUNT_SID: "CHANGE_ME"
  TWILIO_AUTH_TOKEN: "CHANGE_ME"
  TWILIO_PHONE_NUMBER: "CHANGE_ME"

  # ── ML / HuggingFace ──────────────────────────────────────────────────────
  HUGGINGFACE_TOKEN: "hf_CHANGE_ME"
  PINECONE_API_KEY: "CHANGE_ME"
  PINECONE_ENVIRONMENT: "CHANGE_ME"
  WEAVIATE_API_KEY: "CHANGE_ME"
  RUNPOD_API_KEY: "CHANGE_ME"
  RUNPOD_ENDPOINT_ID: "CHANGE_ME"
  WANDB_API_KEY: "CHANGE_ME"

  # ── Payment Gateways ──────────────────────────────────────────────────────
  CMI_MERCHANT_ID: "CHANGE_ME"
  CMI_STORE_KEY: "CHANGE_ME"
  ORANGE_MONEY_CLIENT_ID: "CHANGE_ME"
  ORANGE_MONEY_CLIENT_SECRET: "CHANGE_ME"
  ORANGE_MONEY_MERCHANT_KEY: "CHANGE_ME"
  INWI_MONEY_PARTNER_ID: "CHANGE_ME"
  INWI_MONEY_API_KEY: "CHANGE_ME"
  PAYPAL_CLIENT_ID: "CHANGE_ME"
  PAYPAL_CLIENT_SECRET: "CHANGE_ME"
  WISE_API_KEY: "CHANGE_ME"
  WISE_PROFILE_ID: "CHANGE_ME"

  # ── Email ─────────────────────────────────────────────────────────────────
  SENDGRID_API_KEY: "SG.CHANGE_ME"

  # ── Monitoring ────────────────────────────────────────────────────────────
  SENTRY_DSN: "https://KEY@o0.ingest.sentry.io/PROJECT"