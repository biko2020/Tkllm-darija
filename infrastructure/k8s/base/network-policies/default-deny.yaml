# =============================================================================
# NetworkPolicies — zero-trust pod-to-pod traffic
# Default: deny all ingress + egress, then explicitly allow what's needed.
# Requires a CNI that supports NetworkPolicy (Calico, Cilium, Weave).
# =============================================================================

# ---------------------------------------------------------------------------
# Default deny — all pods in namespace
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tkllm-darija
spec:
  podSelector: {}         # matches ALL pods in namespace
  policyTypes:
    - Ingress
    - Egress

---
# ---------------------------------------------------------------------------
# Allow DNS egress (all pods need kube-dns)
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: tkllm-darija
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# ---------------------------------------------------------------------------
# API pod — ingress from ingress-controller + egress to postgres/redis/kafka
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-network-policy
  namespace: tkllm-darija
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: weaviate
      ports:
        - protocol: TCP
          port: 8080
    # Outbound HTTPS (Supabase, Twilio, Sentry, etc.)
    - ports:
        - protocol: TCP
          port: 443

---
# ---------------------------------------------------------------------------
# ASR Worker — egress to kafka + minio/S3 + MLflow
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: asr-worker-network-policy
  namespace: tkllm-darija
spec:
  podSelector:
    matchLabels:
      app: asr-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: monitoring
      ports:
        - port: 9091        # Prometheus scrape
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: mlflow
      ports:
        - port: 5000
    # S3 / HuggingFace Hub (HTTPS)
    - ports:
        - protocol: TCP
          port: 443

---
# ---------------------------------------------------------------------------
# Financial Service — egress to postgres + redis + kafka + payment gateways
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: financial-service-network-policy
  namespace: tkllm-darija
spec:
  podSelector:
    matchLabels:
      app: financial-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
    # CMI, Orange Money, Inwi Money, PayPal, Wise (HTTPS)
    - ports:
        - protocol: TCP
          port: 443

---
# ---------------------------------------------------------------------------
# PostgreSQL — only accept connections from app pods
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: tkllm-darija
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: tkllm-darija
      ports:
        - protocol: TCP
          port: 5432

---
# ---------------------------------------------------------------------------
# Redis — only accept connections from app pods
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: tkllm-darija
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: tkllm-darija
      ports:
        - protocol: TCP
          port: 6379

---
# ---------------------------------------------------------------------------
# Kafka — only accept connections from app pods
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-network-policy
  namespace: tkllm-darija
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: tkllm-darija
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 29092