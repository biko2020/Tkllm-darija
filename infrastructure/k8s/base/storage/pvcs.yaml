# =============================================================================
# PersistentVolumeClaims — stateful infrastructure services
# StorageClass: "gp3" (AWS EKS) — change to "premium-rwo" for GKE,
#               "do-block-storage" for DigitalOcean, or "standard" for local.
# =============================================================================

# ---------------------------------------------------------------------------
# PostgreSQL — primary data store
# ---------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 100Gi

---
# ---------------------------------------------------------------------------
# Redis — cache + BullMQ queues + session store
# ---------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: redis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 10Gi

---
# ---------------------------------------------------------------------------
# Zookeeper — Kafka coordination
# ---------------------------------------------------------------------------
