---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zookeeper-logs-pvc
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: zookeeper
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
