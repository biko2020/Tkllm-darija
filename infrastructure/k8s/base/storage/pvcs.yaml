---
# ---------------------------------------------------------------------------
# MLflow — experiment tracking artefacts (local fallback)
# NOTE: In production artefacts are stored in S3/R2 — this PVC is only
# used for the SQLite backend if PostgreSQL is unavailable.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: mlflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 10Gi

---
# ---------------------------------------------------------------------------
# HuggingFace model cache — shared across ASR worker pods via ReadWriteMany
# Requires an NFS-backed or EFS StorageClass for multi-pod access.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-cache-pvc
  namespace: tkllm-darija
  labels:
    app.kubernetes.io/part-of: tkllm-darija
    app.kubernetes.io/component: asr-worker
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc        # AWS EFS CSI driver; swap for nfs-client on other clouds
  resources:
    requests:
      storage: 50Gi               # large-v3 Whisper ~3GB; room for multiple models