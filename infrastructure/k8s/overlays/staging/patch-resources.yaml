# =============================================================================
# Patch — resources (staging)
# Mid-tier limits — enough to run real load tests, cheaper than prod.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tkllm-darija
spec:
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"

