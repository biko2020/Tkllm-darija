---
# ASR worker — still CPU mode in staging (GPU nodes expensive)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asr-worker
  namespace: tkllm-darija
spec:
  template:
    spec:
      tolerations: []
      nodeSelector: {}
      containers:
        - name: asr-worker
          env:
            - name: WHISPER_DEVICE
              value: "cpu"
            - name: WHISPER_MODEL
              value: "medium"
            - name: WHISPER_COMPUTE_TYPE
              value: "int8"
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "3000m"
              memory: "8Gi"