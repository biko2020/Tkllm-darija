# =============================================================================
# Patch — resources (prod)
# Full production limits. Higher than base defaults to handle peak load.
# ASR worker gets full GPU resource spec restored.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tkllm-darija
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

---
