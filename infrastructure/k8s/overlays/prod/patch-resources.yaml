---
# ASR worker — full GPU spec restored for prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asr-worker
  namespace: tkllm-darija
spec:
  template:
    spec:
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      nodeSelector:
        node-role: gpu
      containers:
        - name: asr-worker
          env:
            - name: WHISPER_DEVICE
              value: "cuda"
            - name: WHISPER_MODEL
              value: "large-v3"
            - name: WHISPER_COMPUTE_TYPE
              value: "float16"
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"