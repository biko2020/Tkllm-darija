# =============================================================================
# Patch — resources (dev)
# Reduces CPU/memory requests and limits for every Deployment in dev.
# Uses strategic merge patch — only the fields listed here are changed.
# =============================================================================

# ── API ───────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tkllm-darija
spec:
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

