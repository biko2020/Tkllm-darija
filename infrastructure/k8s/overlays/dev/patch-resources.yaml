---
# ── asr-worker — CPU mode in dev (no GPU required) ───────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asr-worker
  namespace: tkllm-darija
spec:
  template:
    spec:
      # Remove GPU node selector + taint tolerations in dev
      tolerations: []
      nodeSelector: {}
      containers:
        - name: asr-worker
          env:
            - name: WHISPER_DEVICE
              value: "cpu"
            - name: WHISPER_MODEL
              value: "small"         # small model fits CPU dev environment
            - name: WHISPER_COMPUTE_TYPE
              value: "int8"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          # Remove GPU resource requests