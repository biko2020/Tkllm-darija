# =============================================================================
# Patch — secrets (dev)
# Replaces the ExternalSecret CR with a plain opaque Secret so dev clusters
# don't need External Secrets Operator or AWS SSM access.
#
# ⚠️  NEVER commit real values. Fill from .env for local dev only.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: tkllm-secrets
  namespace: tkllm-darija
type: Opaque
stringData:
  DATABASE_URL:              "postgresql://tkllm_user:tkllm_password@postgres:5432/tkllm_darija"
  DATABASE_USER:             "tkllm_user"
  DATABASE_PASSWORD:         "tkllm_password"
  REDIS_URL:                 "redis://redis:6379"
  REDIS_PASSWORD:            ""
  S3_ENDPOINT:               "http://minio:9000"
  S3_ACCESS_KEY:             "minioadmin"
  S3_SECRET_KEY:             "minioadmin"
  S3_PUBLIC_URL:             "http://localhost:9000/tkllm-audio"
  JWT_SECRET:                "dev_jwt_secret_change_me_in_production"
  COOKIE_SECRET:             "dev_cookie_secret_change_me"
  ENCRYPTION_KEY:            "dev_encryption_key_32bytes_change"
  SUPABASE_URL:              "https://REPLACE.supabase.co"
  SUPABASE_ANON_KEY:         "REPLACE"
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE"
  SUPABASE_JWT_SECRET:       "REPLACE"
  KEYCLOAK_URL:              "http://keycloak:8080"
  KEYCLOAK_CLIENT_SECRET:    "REPLACE"
  GOOGLE_CLIENT_ID:          "REPLACE"
  GOOGLE_CLIENT_SECRET:      "REPLACE"
  TWILIO_ACCOUNT_SID:        "REPLACE"
  TWILIO_AUTH_TOKEN:         "REPLACE"
  TWILIO_PHONE_NUMBER:       "REPLACE"
  HUGGINGFACE_TOKEN:         "REPLACE"
  PINECONE_API_KEY:          "REPLACE"
  PINECONE_ENVIRONMENT:      "REPLACE"
  WEAVIATE_API_KEY:          "dev-weaviate-key"
  CMI_MERCHANT_ID:           "REPLACE"
  CMI_STORE_KEY:             "REPLACE"
  ORANGE_MONEY_CLIENT_ID:    "REPLACE"
  ORANGE_MONEY_CLIENT_SECRET:"REPLACE"
  ORANGE_MONEY_MERCHANT_KEY: "REPLACE"
  INWI_MONEY_PARTNER_ID:     "REPLACE"
  INWI_MONEY_API_KEY:        "REPLACE"
  SENDGRID_API_KEY:          "REPLACE"
  SENTRY_DSN:                ""