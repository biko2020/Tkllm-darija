# =============================================================================
# KEDA — dev overrides
# Keeps minReplicaCount at 1 (never scale to zero in dev — avoids cold starts
# during testing). Higher lagThreshold to avoid noisy scale-up events.
# =============================================================================
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: asr-worker-scaledobject
  namespace: tkllm-darija
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asr-worker
  pollingInterval: 30
  cooldownPeriod: 60
  idleReplicaCount: 1           # never scale to zero in dev
  minReplicaCount: 1
  maxReplicaCount: 2            # cap at 2 — dev cluster is small
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: asr-worker-group
        topic: transcription.requested
        lagThreshold: "20"      # higher threshold — less sensitive in dev
        offsetResetPolicy: latest