# =============================================================================
# Patch — images (dev)
# Forces imagePullPolicy: Always so dev clusters always pull :dev tags.
# Image newTag is set in kustomization.yaml images[] block above.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tkllm-darija
spec:
  template:
    spec:
      containers:
        - name: api
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: development

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-contributor
  namespace: tkllm-darija
spec:
  template:
    spec:
      containers:
        - name: web-contributor
          imagePullPolicy: Always
          env:
            - name: NEXT_PUBLIC_APP_ENV
              value: development

