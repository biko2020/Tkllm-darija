# CI/CD workflow for ML training, evaluation, and code quality
# Tkllm-darija — .github/workflows/ml.yml

name: ML Pipeline

on:
  push:
    paths:
      - 'ml/**'
      - '.github/workflows/ml.yml'
  pull_request:
    paths:
      - 'ml/**'
      - '.github/workflows/ml.yml'
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint, Format, and Test (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .

      - name: Lint (ruff, black, mypy)
        run: |
          pip install ruff black mypy
          ruff check .
          black --check .
          mypy .

      - name: Run tests (pytest)
        run: |
          pip install pytest
          pytest

  train-and-evaluate:
    name: Train & Evaluate (Whisper)
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: ml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .

      - name: Train Whisper (small config)
        run: |
          python training/train_whisper.py --config training/configs/whisper_small.yaml
        env:
          # Add any required environment variables here
          # Example: WANDB_DISABLED: 'true'
          # Example: CUDA_VISIBLE_DEVICES: ''
          # Example: HF_HOME: /tmp/huggingface
          # Example: MLFLOW_TRACKING_URI: ...
          # Example: DATASET_PATH: ...
          # Example: API_KEY: ${{ secrets.YOUR_API_KEY }}

      - name: Evaluate ASR
        run: |
          python evaluation/evaluate_asr.py
        env:
          # Add any required environment variables here

  format-check:
    name: Prettier Format Check (Node.js, optional)
    runs-on: ubuntu-latest
    if: ${{ always() }}
    defaults:
      run:
        working-directory: ml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Prettier
        run: npm ci

      - name: Run Prettier
        run: npx prettier --check .
